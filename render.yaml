services:
  # 1. Spring Boot Backend
  - type: web
    name: sdc-coreservices
    runtime: docker
    dockerfilePath: backend/coreservices/Dockerfile
    dockerContext: backend/coreservices
    plan: free
    envVars:
      - key: PORT
        value: 8001
      - key: MONGODB_URI
        sync: false

  # 2. FastAPI Gateway
  - type: web
    name: sdc-gateway
    runtime: python
    rootDir: gateway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SPRING_BACKEND_URL
        value: http://sdc-coreservices:8001
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: DATABASE_URL
        value: sqlite:///./sdc_gateway.db

  # 3. React Frontend Static Site
  - type: web
    name: sdc-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://sdc-gateway.onrender.com
