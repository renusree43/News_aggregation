spring.application.name=coreservices

#Server Port
# Bind to the PORT environment variable assigned by Render, defaulting to 8001 locally.
server.port=${PORT:8001}

#MongoDB Configuration
# Defaults to localhost for local development, connects to MongoDB Atlas in production.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/news_db}

jwt.secret=myVeryLongSecretKeyForJwtTokenGeneration123456789
jwt.token-validity=86400000
